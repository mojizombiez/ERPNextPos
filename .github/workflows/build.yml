name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Build Application
        run: |
          # The script expects internal/services/update_service.go to have the version
          wails build -platform linux/amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoltoPos-linux
          path: build/bin/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform windows/amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoltoPos-windows
          path: build/bin/

  deploy:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: MoltoPos-linux
          path: deploy/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: MoltoPos-windows
          path: deploy/windows

      - name: Prepare Files for Upload
        run: |
          VERSION="1.3.0"
          mkdir -p upload/erpnext/windows
          mkdir -p upload/erpnext/linux
          
          # Windows
          cp deploy/windows/MoltoPos.exe "upload/erpnext/windows/MoltoPos-v${VERSION}.exe"
          
          # Linux (assuming wails produces 'MoltoPos')
          cp deploy/linux/MoltoPos "upload/erpnext/linux/MoltoPos-v${VERSION}"
          
          # Also upload update.json to the root of erpnext
          cp update.json upload/erpnext/update.json

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./upload/
          server-dir: ./
          dangerous-clean-slate: false
