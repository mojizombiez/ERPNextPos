name: Build and Deploy
# Triggered rebranding release v1.3.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Build Application
        run: |
          # The script expects internal/services/update_service.go to have the version
          wails build -platform linux/amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoltoPos-linux
          path: build/bin/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform windows/amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoltoPos-windows
          path: build/bin/

  deploy:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: MoltoPos-linux
          path: deploy/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: MoltoPos-windows
          path: deploy/windows

      - name: Sanitize FTP Paths
        run: |
          # Function to ensure trailing slash
          fix_path() {
            local p="$1"
            [[ "$p" != */ ]] && echo "${p}/" || echo "$p"
          }
          
          echo "FTP_DIR_WINDOWS_FIX=$(fix_path '${{ secrets.FTP_DIR_WINDOWS }}')" >> $GITHUB_ENV
          echo "FTP_DIR_LINUX_FIX=$(fix_path '${{ secrets.FTP_DIR_LINUX }}')" >> $GITHUB_ENV
          echo "FTP_DIR_UPDATE_FIX=$(fix_path '${{ secrets.FTP_DIR_UPDATE || '/erpnext/' }}')" >> $GITHUB_ENV
          echo "FTP_DIR_LANDING_FIX=$(fix_path '${{ secrets.FTP_DIR_LANDING || '/erpnext/' }}')" >> $GITHUB_ENV

      - name: Prepare Files for Upload
        run: |
          VERSION="1.3.0"
          
          # Prepare Windows
          mv deploy/windows/MoltoPos.exe "deploy/windows/MoltoPos-v${VERSION}.exe"
          
          # Prepare Linux
          mv deploy/linux/MoltoPos "deploy/linux/MoltoPos-v${VERSION}"
          
          # Prepare Meta (update.json)
          mkdir -p upload_meta
          cp update.json upload_meta/update.json
          
          # Prepare Landing Page & Manuals
          mkdir -p upload_landing
          cp index.html upload_landing/
          cp manual.html upload_landing/
          cp USER_MANUAL.md upload_landing/
          cp USER_MANUAL_TH.md upload_landing/
          cp -r landing_assets upload_landing/

      - name: FTP Deploy Windows
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/windows/
          server-dir: ${{ env.FTP_DIR_WINDOWS_FIX }}
          dangerous-clean-slate: false

      - name: FTP Deploy Linux
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/linux/
          server-dir: ${{ env.FTP_DIR_LINUX_FIX }}
          dangerous-clean-slate: false

      - name: FTP Deploy update.json
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./upload_meta/
          server-dir: ${{ env.FTP_DIR_UPDATE_FIX }}
          dangerous-clean-slate: false

      - name: FTP Deploy Landing & Manuals
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./upload_landing/
          server-dir: ${{ env.FTP_DIR_LANDING_FIX }}
          dangerous-clean-slate: false
