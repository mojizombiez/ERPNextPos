<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download MWinPOS Updater</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --linux: #f59e0b;
            --linux-hover: #d97706;
            --disabled: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite ease-in-out alternate;
        }
        .circle-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            top: -100px;
            left: -100px;
        }
        .circle-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(to right, #10b981, #059669);
            bottom: -200px;
            right: -150px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            border: none;
            outline: none;
            min-width: 200px;
        }

        .download-btn.linux {
            background: linear-gradient(135deg, var(--linux), var(--linux-hover));
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.5);
        }

        .download-btn.linux:hover {
            box-shadow: 0 15px 25px rgba(245, 158, 11, 0.5);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        .download-btn.disabled {
            background: var(--disabled);
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.9;
            transform: none;
        }
        
        .download-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .version-info {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
            padding-top: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        
        /* Icons */
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        
        .platforms-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container">
        <div class="logo">M</div>
        <h1>MWinPOS</h1>
        <p>Your complete POS solution. Download the latest version to get the newest features and improvements.</p>
        
        <div class="platforms-title">Available Platforms</div>
        <div class="button-group">
            <a id="downloadWindowsLink" href="#" class="download-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
                Download for Windows

            <a id="downloadLinuxLink" href="#" class="download-btn linux">

        </div>

                <svg class="icon" viewBox="0 0 24 24"><path d="M17.523 15.3414c-.011-3.5652 2.903-5.2673 3.0366-5.3465-1.6558-2.42-4.2234-2.7504-5.0864-2.788-2.1524-.2164-4.2045 1.2687-5.305 1.2687-1.1116 0-2.793-1.2384-4.567-1.203-2.3168.0326-4.4607 1.3444-5.6443 3.4-2.413 4.185-.6154 10.3708 1.724 13.7508 1.1518 1.666 2.5126 3.5134 4.3015 3.4475 1.737-.0666 2.404-1.1197 4.5028-1.1197 2.0864 0 2.7042 1.1197 4.5205 1.087 1.8653-.032 3.0315-1.6917 4.168-3.3516 1.3146-1.9184 1.8546-3.7784 1.88-3.873-.0415-.0152-3.6195-1.3912-3.6338-5.5714M11.99 7.0272c.9575-1.1587 1.604-2.7663 1.428-4.3737-1.3855.0564-3.0487.9226-4.0374 2.1154-.8812 1.059-1.6547 2.7018-1.4426 4.281 1.5435.1194 3.097-1.0425 4.051-2.023"/></svg>
                iOS App
            </div>
            
            <div class="download-btn disabled">
                <svg class="icon" viewBox="0 0 24 24"><path d="M17.525 9.74h-.002a3.868 3.868 0 00-3.136-2.583v-1.74a.8.8 0 00-1.6 0v1.651a3.812 3.812 0 00-1.575.45c-.234.123-.457.26-.667.41V2.8a.8.8 0 00-1.6 0v15.968a.8.8 0 00.8.8h.08a10.655 10.655 0 00-1.155 3.01.8.8 0 101.551.402A8.995 8.995 0 0113.882 18h6.594a1.864 1.864 0 001.865-1.865V11.6a1.864 1.864 0 00-1.864-1.86h-2.952zm-1.895 2.11a1.29 1.29 0 110 2.58 1.29 1.29 0 010-2.58zM12.788 8.78c.84 0 1.54.67 1.54 1.498H9.7c0-.828.7-1.498 1.54-1.498h1.548zM6.55 12.2a2.3 2.3 0 00-2.298-2.29h-.9c-.93 0-1.684.757-1.684 1.68v4.912c0 .927.754 1.684 1.685 1.684h.9A2.3 2.3 0 006.55 15.89V12.2zm-2.4 4.386H3.34V11.59h.81c.382 0 .698.312.698.692v3.61c0 .385-.316.7-.698.7z"/></svg>
                Android App
            </div>
        </div>

        <div class="platforms-title">Documentation</div>
        <div class="button-group">
            <a href="manual.html?lang=en" class="download-btn" style="background: transparent; color: var(--text-main); border: 2px solid #cbd5e1; box-shadow: none; min-width: 140px; padding: 12px 20px;">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                Manual (EN)
            </a>
            <a href="manual.html?lang=th" class="download-btn" style="background: transparent; color: var(--text-main); border: 2px solid #cbd5e1; box-shadow: none; min-width: 140px; padding: 12px 20px;">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                คู่มือใช้งาน (TH)
            </a>
        </div>
        
        <div class="version-info">
            <span id="versionText">Loading latest version data...</span>
            <div class="status">
                <div class="status-dot"></div>
                <span>Server Online</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const downloadWinLink = document.getElementById('downloadWindowsLink');
            const downloadLinLink = document.getElementById('downloadLinuxLink');
            const versionText = document.getElementById('versionText');
            
            try {
                // Fetch Windows update data
                const winResponse = await fetch('/erpnext/windows/update.json?t=' + new Date().getTime());
                if (winResponse.ok) {
                    const winData = await winResponse.json();
                    downloadWinLink.href = winData.url;
                    versionText.textContent = `Latest Windows Release: v${winData.version}`;
                } else {
                    downloadWinLink.href = 'MWinPOS-v1.0.0.exe'; 
                }

                // Fetch Linux update data
                const linResponse = await fetch('/erpnext/linux/update.json?t=' + new Date().getTime());
                if (linResponse.ok) {
                    const linData = await linResponse.json();
                    downloadLinLink.href = linData.url;
                } else {
                     downloadLinLink.href = 'MWinPOS-v1.0.0-linux'; 
                }

            } catch (error) {
                console.error(error);
                downloadWinLink.href = 'MWinPOS-v1.0.0.exe'; 
                downloadLinLink.href = 'MWinPOS-v1.0.0-linux'; 
                versionText.textContent = 'Unable to securely verify latest version.';
            }
        });
    </script>
</body>
</html>
