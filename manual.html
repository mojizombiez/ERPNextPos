<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoltoPos User Manual</title>
    <!-- External Fonts and Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Highlight.js for code block styling -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 300px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            font-size: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Elements (From Index) */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
        }

        .blob-1 { background: rgba(139, 92, 246, 0.15); top: -10%; left: -10%; animation: float 20s infinite alternate; }
        .blob-2 { background: rgba(16, 185, 129, 0.1); bottom: -10%; right: -10%; animation: float 25s infinite alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Nav Header */
        .header {
            width: 100%;
            background: rgba(3, 7, 18, 0.5);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 10%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            margin: 0;
        }

        .lang-controls {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Layout Container */
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 80px auto 0;
            padding: 0 5%;
            gap: 40px;
        }

        /* Sidebar TOC */
        .sidebar {
            width: var(--sidebar-width);
            position: sticky;
            top: 100px;
            height: calc(100vh - 120px);
            overflow-y: auto;
            padding-right: 20px;
            flex-shrink: 0;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

        .toc-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 8px;
        }

        .toc-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: block;
            padding: 6px 12px;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toc-link:hover {
            color: white;
            background: var(--glass);
        }

        .toc-link.active {
            color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            font-weight: 700;
        }

        /* Content Area */
        .content-container {
            flex-grow: 1;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px;
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Markdown Styles */
        .markdown-body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .markdown-body h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-body h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 56px;
            margin-bottom: 24px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .markdown-body h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        .markdown-body h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 32px;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .markdown-body p {
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 1.0625rem;
            line-height: 1.8;
        }

        .markdown-body a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .markdown-body a:hover {
            border-bottom-color: var(--primary);
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 24px;
            padding-left: 24px;
            color: var(--text-muted);
        }

        .markdown-body li {
            margin-bottom: 8px;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--primary);
            padding: 16px 24px;
            background: rgba(139, 92, 246, 0.05);
            border-radius: 0 12px 12px 0;
            margin-bottom: 24px;
            font-style: italic;
        }

        .markdown-body code {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 3px 6px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            color: #f472b6;
        }

        .markdown-body pre {
            background-color: #0d1117;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            color: #e6edf3;
            font-size: 0.875rem;
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            margin: 32px 0;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .markdown-body img:hover {
            transform: scale(1.01);
        }

        .markdown-body table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
        }

        .markdown-body th, .markdown-body td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .markdown-body th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 700;
            color: white;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .markdown-body tr:last-child td {
            border-bottom: none;
        }

        /* Loading Spinner */
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 0;
        }

        .loader {
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 48px;
            height: 48px;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
            .main-layout {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .content-container {
                padding: 30px;
                border-radius: 20px;
            }
            .header {
                padding: 12px 5%;
            }
            .markdown-body h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo-area">
            <div class="logo-icon">M</div>
            <h1>MoltoPos</h1>
        </a>
        <div class="lang-controls">
            <a href="?lang=en" id="btn-en" class="lang-btn">English</a>
            <a href="?lang=th" id="btn-th" class="lang-btn">ภาษาไทย</a>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="toc-title">On this page</div>
            <nav id="toc">
                <ul class="toc-list" id="toc-list">
                    <!-- Populated by script -->
                </ul>
            </nav>
        </aside>

        <main class="content-container">
            <div id="content" class="markdown-body">
                <div class="loader-wrapper">
                    <div class="loader"></div>
                    <p style="color: var(--text-muted)">Crafting your manual...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for Code syntax -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentDiv = document.getElementById('content');
            const tocList = document.getElementById('toc-list');
            const btnEn = document.getElementById('btn-en');
            const btnTh = document.getElementById('btn-th');

            // Setup Marked with custom renderer
            const renderer = new marked.Renderer();
            
            // Custom heading renderer to add IDs and collect TOC items
            const tocItems = [];
            renderer.heading = function (args) {
                // Handle both old (text, level) and new ({text, depth}) signatures
                const text = typeof args === 'string' ? args : args.text;
                const level = typeof args === 'string' ? arguments[1] : args.depth;

                const slug = text.toLowerCase()
                    .replace(/[^\w\s\u4e00-\u9fa5.-]/g, '')
                    .replace(/[.\s]+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-+|-+$/g, '');
                
                // Only collect H2 for the sidebar to keep it clean
                if (level === 2) {
                    tocItems.push({ text, slug });
                }
                
                return `<h${level} id="${slug}">${text}</h${level}>`;
            };

            marked.setOptions({
                renderer: renderer,
                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                gfm: true,
                breaks: true
            });

            // Determine language
            const urlParams = new URLSearchParams(window.location.search);
            const lang = urlParams.get('lang') || 'en';

            if (lang === 'th') btnTh.classList.add('active');
            else btnEn.classList.add('active');

            const mdFileUrl = '/erpnext/' + (lang === 'th' ? 'USER_MANUAL_TH.md' : 'USER_MANUAL.md');

            fetch(mdFileUrl + '?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to load manual (HTTP ${response.status})`);
                    return response.text();
                })
                .then(markdown => {
                    // Render Content
                    contentDiv.innerHTML = marked.parse(markdown);
                    
                    // Populate TOC Sidebar
                    tocList.innerHTML = tocItems.map(item => `
                        <li class="toc-item">
                            <a href="#${item.slug}" class="toc-link">${item.text}</a>
                        </li>
                    `).join('');

                    // Initial scroll to hash if present
                    if (window.location.hash) {
                        const target = document.querySelector(window.location.hash);
                        if (target) target.scrollIntoView();
                    }

                    // Setup ScrollSpy for TOC
                    setupScrollSpy();
                })
                .catch(error => {
                    console.error(error);
                    contentDiv.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <h3 style="color: #ef4444; margin-bottom: 16px;">Failed to load documentation</h3>
                            <p style="color: var(--text-muted); margin-bottom: 24px;">${error.message}</p>
                            <a href="index.html" class="lang-btn active">Return to Home</a>
                        </div>
                    `;
                });

            function setupScrollSpy() {
                const links = document.querySelectorAll('.toc-link');
                const headings = Array.from(document.querySelectorAll('.markdown-body h2'));

                window.addEventListener('scroll', () => {
                    let current = '';
                    headings.forEach(heading => {
                        const top = heading.offsetTop;
                        if (window.pageYOffset >= top - 150) {
                            current = heading.getAttribute('id');
                        }
                    });

                    links.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === '#' + current) {
                            link.classList.add('active');
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
